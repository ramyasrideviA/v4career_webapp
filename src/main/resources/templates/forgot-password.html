<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Forgot Password</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="signin-page">
    <div class="signin-wrapper">
        <div class="brand-logo-container">
            <img th:src="@{/logo/logo.jpg}" alt="v4career Logo" class="brand-logo">
        </div>

        <div class="signin-form-box">
            <div th:if="${error}" class="alert alert-error" th:text="${error}">
            </div>

            <form th:action="@{/reset-password}" method="post" id="forgotPasswordForm">

                <div class="form-group email-verification-group">
                    <div class="input-line">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="emailId" name="emailId" required
                            placeholder="Enter your registered email" />
                        <button type="button" id="getOtpBtn" class="btn btn-secondary" data-type="reset">Get
                            OTP</button>
                    </div>
                </div>

                <div class="form-group" id="otpGroup" style="display: none;">
                    <div class="input-line">
                        <i class="fa-solid fa-shield-halved"></i>
                        <input type="text" id="otp" name="otpInput" placeholder="Enter OTP" />
                        <button type="button" id="verifyOtpBtn" class="btn btn-secondary">Verify</button>
                    </div>
                    <input type="hidden" id="verified" name="verified" value="false" />
                    <span id="otpStatus" class="status-msg"></span>
                </div>

                <div class="input-line">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" name="password" required placeholder="New Password" />
                </div>

                <div class="input-line">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="reEnterPassword" name="reEnterPassword" required
                        placeholder="Confirm Password" />
                </div>

                <button type="submit" class="btn-signin" id="signupBtn" disabled>RESET PASSWORD</button>

                <div class="signin-footer">
                    <p>Remembered your password? <a th:href="@{/signin}">Sign In</a></p>
                </div>
            </form>
        </div>
    </div>
    <script th:src="@{/js/auth.js}"></script>
</body>

</html>
