<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Sign In</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="signin-page">
    <div class="signin-wrapper">
        <div class="brand-logo-container">
            <img th:src="@{/logo/logo.jpg}" alt="v4career Logo" class="brand-logo">
        </div>
        <div class="brand-career-container">
            <img th:src="@{/logo/logo_career.jpg}" class="brand-logo-career">
        </div>

        <div class="signin-form-box">
            <div th:if="${param.error}" class="alert alert-error">
                Invalid username or password.
            </div>
            <div th:if="${param.logout}" class="alert alert-success">
                You have been logged out.
            </div>
            <div th:if="${param.success}" class="alert alert-success">
                Registration successful! Please sign in.
            </div>

            <form th:action="@{/signin}" method="post">
                <div class="input-line">
                    <i class="fa-regular fa-user"></i>
                    <input type="email" id="emailId" name="emailId" required placeholder="Username" />
                </div>

                <div class="input-line">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" name="password" required placeholder="Password" />
                </div>

                <div class="forgot-link-container">
                    <a th:href="@{/forgot-password}" class="forgot-password">Forgot Password</a>
                </div>

                <button type="submit" class="btn-signin">Sign In</button>

                <div class="signin-footer">
                    <p>Don't have an account? <a th:href="@{/signup}">Sign Up</a></p>
                </div>
        </form>
        </div>
    </div>
    <script th:src="@{/js/auth.js}"></script>
</body>

</html>
